job:
  name: live_example
  description: Worked example — live mode with 10 entities and 10 counterparties

datasets:
  a:
    path: examples/live/set_1.csv
    id_field: entity_id
  b:
    path: examples/live/set_2.csv
    id_field: counterparty_id

cross_map:
  backend: local
  path: examples/live/output/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: examples/live/cache
  b_cache_dir: examples/live/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

candidates:
  field_a: short_name
  field_b: counterparty_name
  method: fuzzy
  scorer: wratio
  n: 5

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55

  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20

  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20

  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  results_path:   examples/live/output/results.csv
  review_path:    examples/live/output/review.csv
  unmatched_path: examples/live/output/unmatched.csv

performance:
  encoder_pool_size: 2

live:
  top_n: 5
  upsert_log: examples/live/output/wal.ndjson
