job:
  name: batch_example
  description: Worked example — 10 entities vs 25 counterparties

datasets:
  a:
    path: examples/batch/reference.csv
    id_field: entity_id
  b:
    path: examples/batch/incoming.csv
    id_field: counterparty_id

cross_map:
  backend: local
  path: examples/batch/output/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: examples/batch/cache
  b_cache_dir: examples/batch/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

# Small example dataset — flat scan is fast enough and has no dependencies.
vector_backend: flat
top_n: 10

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55

  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20

  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20

  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.10

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  csv_dir_path: examples/batch/output/

performance:
  encoder_pool_size: 2
