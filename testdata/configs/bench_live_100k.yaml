# Live-mode config for 100k x 100k stress testing.
# Mirrors bench_live.yaml but uses the 100k datasets.

job:
  name: bench_live_100kx100k
  description: Live serve — 100k x 100k synthetic data, upsert stress test

datasets:
  a:
    path: testdata/dataset_a_100k.csv
    id_field: entity_id
    format: csv
  b:
    path: testdata/dataset_b_100k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: bench/crossmap_live_100k.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: bench/cache
  b_cache_dir: bench/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

top_n: 5

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55

  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20

  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20

  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

vector_backend: flat

performance:
  encoder_pool_size: 4

live:
  upsert_log: bench/live_upserts_100k.ndjson

# output paths unused in live mode but required by the config validator
output:
  results_path:   bench/output/live_results_100k.csv
  review_path:    bench/output/live_review_100k.csv
  unmatched_path: bench/output/live_unmatched_100k.csv
