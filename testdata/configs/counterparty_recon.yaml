# jobs/counterparty_recon.yaml
#
# Match incoming counterparty records (B) against the reference entity master (A).
# Confirmed matches copy sector, rating and LEI from A onto B.

job:
  name: counterparty_recon
  description: Daily reconciliation of counterparty records against reference entity master

datasets:
  a:
    path: data/reference_entities.parquet
    id_field: entity_id
    format: parquet

  b:
    path: data/counterparties.csv
    id_field: counterparty_id
    encoding: utf-8

cross_map:
  backend: local
  path: data/crossmap_counterparty.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: cache/counterparty

blocking:
  enabled: true
  field_a: country_code
  field_b: domicile

candidates:
  field_a: short_name
  field_b: counterparty_name
  method: fuzzy
  scorer: wratio
  n: 10

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55

  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20

  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20

  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

output_mapping:
  - from: sector
    to: ref_sector
  - from: credit_rating
    to: ref_rating
  - from: lei
    to: ref_lei
  - from: legal_name
    to: ref_legal_name

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  results_path:   output/counterparty/results.csv
  review_path:    output/counterparty/review.csv
  unmatched_path: output/counterparty/unmatched.csv

performance:
  encoder_pool_size: 2
  workers: 4

sidecar:
  address: localhost:50051
  timeout_ms: 5000
