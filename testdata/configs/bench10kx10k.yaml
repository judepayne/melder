# bench/bench10kx10k.yaml
# Benchmark job: 10k A vs 10k B, no cross-map pre-seeded.

job:
  name: bench_10kx10k
  description: Benchmark — 10k x 10k synthetic data, empty cross-map

datasets:
  a:
    path: testdata/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: testdata/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: bench/crossmap10k.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: bench/cache
  b_cache_dir: bench/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

candidates:
  enabled: false
  field_a: short_name
  field_b: counterparty_name
  method: fuzzy
  scorer: wratio
  n: 10

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55

  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20

  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20

  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  results_path:   bench/output/results_10k.csv
  review_path:    bench/output/review_10k.csv
  unmatched_path: bench/output/unmatched_10k.csv

performance:
  encoder_pool_size: 4
