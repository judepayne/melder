# bench/bench10000x10000.yaml
# Benchmark job: 10000 A vs 10000 B, no cross-map pre-seeded.

job:
  name: bench_10000x10000
  description: Benchmark — 10000 x 10000 synthetic data, empty cross-map

datasets:
  a:
    path: testdata/dataset_a_10000.csv
    id_field: entity_id
    format: csv
  b:
    path: testdata/dataset_b_10000.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: bench/crossmap10k.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_index_cache: bench/cache/a_10000.index
  b_index_cache: bench/cache/b_10000.index

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

candidates:
  enabled: true
  field_a: short_name
  field_b: counterparty_name
  method: fuzzy
  scorer: wratio
  n: 10

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55

  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20

  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20

  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  results_path:   bench/output/results_10000.csv
  review_path:    bench/output/review_10000.csv
  unmatched_path: bench/output/unmatched_10000.csv

performance:
  encoder_pool_size: 4
  workers: 8
