# Benchmark job: 100,000 A vs 100,000 B, no cross-map pre-seeded.

job:
  name: bench_100kx100k
  description: Benchmark — 100k x 100k synthetic data, empty cross-map

datasets:
  a:
    path: testdata/dataset_a_100k.csv
    id_field: entity_id
  b:
    path: testdata/dataset_b_100k.csv
    id_field: counterparty_id

cross_map:
  backend: local
  path: bench/crossmap100k.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: bench/cache
  b_cache_dir: bench/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

candidates:
  enabled: false
  field_a: short_name
  field_b: counterparty_name
  method: fuzzy
  scorer: wratio
  n: 10

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55

  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20

  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20

  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  results_path:   bench/output/results_100k.csv
  review_path:    bench/output/review_100k.csv
  unmatched_path: bench/output/unmatched_100k.csv

performance:
  encoder_pool_size: 4

vector_backend: usearch
