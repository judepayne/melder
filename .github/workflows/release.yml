name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # run all three even if one fails
      matrix:
        include:
          - name: macOS ARM
            os: macos-14
            target: aarch64-apple-darwin
            binary: meld
            archive: tar.gz
            cargo_features: "--features usearch,parquet-format,simd"

          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: meld
            archive: tar.gz
            cargo_features: "--features usearch,parquet-format,simd"

          - name: Windows x86_64 MSVC
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: meld.exe
            archive: zip
            cargo_features: "--features parquet-format,simd"  # usearch excluded: MSVC bugs

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build
        run: cargo build --release ${{ matrix.cargo_features }} --target ${{ matrix.target }}

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="meld-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "meld-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\${{ matrix.binary }}" `
            -DestinationPath $archive
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v7
        with:
          name: meld-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Publish ─────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
