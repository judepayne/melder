match_fields:
  - field_a: name
    field_b: name
    method: embedding
    weight: 1.0

embeddings:
  model: "themelder/arctic-embed-xs-entity-resolution"

performance:
  encoder_device: gpu
  encoder_batch_size: 256

blocking:
  fields:
    - field_a: country
      field_b: country
  operator: and

thresholds:
  auto_match: 0.85
  review: 0.70
