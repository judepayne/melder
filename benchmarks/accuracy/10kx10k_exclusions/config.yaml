job:
  name: accuracy_10kx10k_exclusions
  description: Accuracy test — exclusions + initial match pass, 10k × 10k

datasets:
  a:
    path: benchmarks/accuracy/10kx10k_exclusions/data/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/accuracy/10kx10k_exclusions/data/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/accuracy/10kx10k_exclusions/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

exclusions:
  path: benchmarks/accuracy/10kx10k_exclusions/exclusions.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: benchmarks/accuracy/10kx10k_exclusions/cache
  b_cache_dir: benchmarks/accuracy/10kx10k_exclusions/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55
  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20
  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20
  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

vector_backend: usearch
top_n: 5
ann_candidates: 5

performance:
  encoder_pool_size: 1
  vector_index_mode: "load"

live:
  match_log_path: benchmarks/accuracy/10kx10k_exclusions/wal/events.ndjson

output:
  csv_dir_path: benchmarks/accuracy/10kx10k_exclusions/output/
