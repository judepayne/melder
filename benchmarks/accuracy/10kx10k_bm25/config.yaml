job:
  name: accuracy_10kx10k_bm25
  description: Accuracy benchmark — 10k × 10k, BM25-only, no fuzzy/exact
datasets:
  a:
    path: benchmarks/data/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv
cross_map:
  backend: local
  path: benchmarks/accuracy/10kx10k_bm25/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id
embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: benchmarks/accuracy/10kx10k_bm25/cache
exact_prefilter:
  enabled: true
  fields:
  - field_a: lei
    field_b: lei_code
blocking:
  enabled: true
  operator: and
  fields:
  - field_a: country_code
    field_b: domicile
match_fields:
- method: bm25
  weight: 1.0
  fields:
  - field_a: legal_name
    field_b: counterparty_name
  - field_a: short_name
    field_b: counterparty_name
  - field_a: registered_address
    field_b: counterparty_address
thresholds:
  auto_match: 0.85
  review_floor: 0.6
output:
  csv_dir_path: benchmarks/accuracy/10kx10k_bm25/output/
performance:
  encoder_pool_size: 4
top_n: 20
bm25_candidates: 20
