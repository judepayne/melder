job:
  name: experiment_7
  description: "Synonym matching verification \u2014 baseline (no synonym)"
datasets:
  a:
    path: benchmarks/accuracy/science/results/experiment_7/dataset_a.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/accuracy/science/results/experiment_7/dataset_b.csv
    id_field: counterparty_id
    format: csv
cross_map:
  backend: local
  path: benchmarks/accuracy/science/results/experiment_7/baseline/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id
embeddings:
  model: benchmarks/accuracy/science/results/experiment_7/model/model.onnx
  a_cache_dir: benchmarks/accuracy/science/results/experiment_7/baseline/cache/a
  b_cache_dir: benchmarks/accuracy/science/results/experiment_7/baseline/cache/b
blocking:
  enabled: true
  operator: and
  fields:
  - field_a: country_code
    field_b: domicile
bm25_fields:
- field_a: legal_name
  field_b: counterparty_name
- field_a: registered_address
  field_b: counterparty_address
match_fields:
- field_a: legal_name
  field_b: counterparty_name
  method: embedding
  weight: 0.48
- field_a: registered_address
  field_b: counterparty_address
  method: embedding
  weight: 0.32
- method: bm25
  weight: 0.2
thresholds:
  auto_match: 0.64
  review_floor: 0.52
output:
  results_path: benchmarks/accuracy/science/results/experiment_7/baseline/output/results.csv
  review_path: benchmarks/accuracy/science/results/experiment_7/baseline/output/review.csv
  unmatched_path: benchmarks/accuracy/science/results/experiment_7/baseline/output/unmatched.csv
performance:
  encoder_pool_size: 4
  vector_index_mode: load
vector_backend: usearch
top_n: 5
ann_candidates: 50
