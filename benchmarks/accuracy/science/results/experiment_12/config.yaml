job:
  name: experiment_12
  description: Arctic-xs + 40% BM25 + synonym 0.20 + wratio 0.10
datasets:
  a:
    path: benchmarks/accuracy/science/master/dataset_a.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/accuracy/science/holdout/dataset_b.csv
    id_field: counterparty_id
    format: csv
cross_map:
  backend: local
  path: benchmarks/accuracy/science/results/experiment_12/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id
embeddings:
  model: benchmarks/accuracy/science/results/experiment_9/models/round_22/model.onnx
  a_cache_dir: benchmarks/accuracy/science/results/experiment_12/cache/a
  b_cache_dir: benchmarks/accuracy/science/results/experiment_12/cache/b
blocking:
  enabled: true
  operator: and
  fields:
  - field_a: country_code
    field_b: domicile
bm25_fields:
- field_a: legal_name
  field_b: counterparty_name
- field_a: registered_address
  field_b: counterparty_address
match_fields:
- field_a: legal_name
  field_b: counterparty_name
  method: embedding
  weight: 0.3
- field_a: registered_address
  field_b: counterparty_address
  method: embedding
  weight: 0.2
- method: bm25
  weight: 0.5
- field_a: legal_name
  field_b: counterparty_name
  method: synonym
  weight: 0.2
thresholds:
  auto_match: 0.88
  review_floor: 0.6
output:
  results_path: benchmarks/accuracy/science/results/experiment_12/output/results.csv
  review_path: benchmarks/accuracy/science/results/experiment_12/output/review.csv
  unmatched_path: benchmarks/accuracy/science/results/experiment_12/output/unmatched.csv
performance:
  encoder_pool_size: 4
  vector_index_mode: load
vector_backend: usearch
top_n: 5
ann_candidates: 50
