job:
  name: experiment_13_composite_50_50
  description: 'Exp 13: 50% embedding + 50% BM25 + synonym'
datasets:
  a:
    path: benchmarks/accuracy/science/master/dataset_a.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/accuracy/science/holdout/dataset_b.csv
    id_field: counterparty_id
    format: csv
cross_map:
  backend: local
  path: benchmarks/accuracy/science/results/experiment_13/composite_50_50/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id
blocking:
  enabled: true
  operator: and
  fields:
  - field_a: country_code
    field_b: domicile
thresholds:
  auto_match: 0.88
  review_floor: 0.6
output:
  csv_dir_path: benchmarks/accuracy/science/results/experiment_13/composite_50_50/output/
performance:
  encoder_pool_size: 4
  vector_index_mode: load
top_n: 5
embeddings:
  model: benchmarks/accuracy/science/results/experiment_9/models/round_22/model.onnx
  a_cache_dir: benchmarks/accuracy/science/results/experiment_13/composite_50_50/cache/a
  b_cache_dir: benchmarks/accuracy/science/results/experiment_13/composite_50_50/cache/b
vector_backend: usearch
ann_candidates: 50
bm25_fields:
- field_a: legal_name
  field_b: counterparty_name
- field_a: registered_address
  field_b: counterparty_address
synonym_fields:
- field_a: legal_name
  field_b: counterparty_name
match_fields:
- field_a: legal_name
  field_b: counterparty_name
  method: embedding
  weight: 0.3
- field_a: registered_address
  field_b: counterparty_address
  method: embedding
  weight: 0.2
- method: bm25
  weight: 0.5
- field_a: legal_name
  field_b: counterparty_name
  method: synonym
  weight: 0.2
