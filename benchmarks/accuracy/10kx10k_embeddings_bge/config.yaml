job:
  name: accuracy_10kx10k_embeddings_bge
  description: Accuracy benchmark — 10k × 10k, embeddings-only (usearch), BAAI/bge-small-en-v1.5

datasets:
  a:
    path: benchmarks/data/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/accuracy/10kx10k_embeddings_bge/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: BAAI/bge-small-en-v1.5
  a_cache_dir: benchmarks/accuracy/10kx10k_embeddings_bge/cache
  b_cache_dir: benchmarks/accuracy/10kx10k_embeddings_bge/cache

exact_prefilter:
  enabled: true
  fields:
    - field_a: lei
      field_b: lei_code

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.60
  - field_a: registered_address
    field_b: counterparty_address
    method: embedding
    weight: 0.40

thresholds:
  auto_match: 0.88
  review_floor: 0.80

output:
  csv_dir_path: benchmarks/accuracy/10kx10k_embeddings_bge/output/

performance:
  encoder_pool_size: 4
  vector_index_mode: "load"

vector_backend: usearch
top_n: 20
ann_candidates: 20
