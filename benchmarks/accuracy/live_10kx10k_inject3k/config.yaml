job:
  name: live_accuracy_10kx10k_inject3k
  description: Live accuracy regression test — asymmetric field names, initial match + injection

datasets:
  a:
    path: benchmarks/accuracy/live_10kx10k_inject3k/data/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/accuracy/live_10kx10k_inject3k/data/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/accuracy/live_10kx10k_inject3k/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: benchmarks/accuracy/live_10kx10k_inject3k/cache
  b_cache_dir: benchmarks/accuracy/live_10kx10k_inject3k/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.35
  - field_a: registered_address
    field_b: counterparty_address
    method: embedding
    weight: 0.20
  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20
  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20
  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

vector_backend: usearch
top_n: 5
ann_candidates: 50

performance:
  encoder_pool_size: 4
  vector_index_mode: "load"

live:
  skip_initial_match: false
  upsert_log: benchmarks/accuracy/live_10kx10k_inject3k/wal/events.ndjson

output:
  results_path:   benchmarks/accuracy/live_10kx10k_inject3k/output/results.csv
  review_path:    benchmarks/accuracy/live_10kx10k_inject3k/output/review.csv
  unmatched_path: benchmarks/accuracy/live_10kx10k_inject3k/output/unmatched.csv
