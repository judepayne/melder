job:
  name: live_100kx100k_inject10k_usearch_bm25_warm
  description: Live benchmark — 100k × 100k, usearch + BM25, 10k injected events, warm run

datasets:
  a:
    path: benchmarks/data/dataset_a_100k.csv
    id_field: entity_id
  b:
    path: benchmarks/data/dataset_b_100k.csv
    id_field: counterparty_id

cross_map:
  backend: local
  path: benchmarks/live/100kx100k_inject10k_usearch_bm25/warm/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: themelder/arctic-embed-xs-entity-resolution
  a_cache_dir: benchmarks/live/100kx100k_inject10k_usearch_bm25/warm/cache
  b_cache_dir: benchmarks/live/100kx100k_inject10k_usearch_bm25/warm/cache

blocking:
  enabled: true
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.50
  - method: bm25
    weight: 0.50

thresholds:
  auto_match: 0.85
  review_floor: 0.60

vector_backend: usearch
top_n: 5
ann_candidates: 20
bm25_candidates: 20

performance:
  encoder_pool_size: 6
  encoder_batch_wait_ms: 0
  vector_index_mode: "load"
  expansion_search: 20

live:
  skip_initial_match: true
  match_log_path: benchmarks/live/100kx100k_inject10k_usearch_bm25/warm/wal/events.ndjson

output:
  csv_dir_path: benchmarks/live/100kx100k_inject10k_usearch_bm25/warm/output
