job:
  name: hooks_10kx10k_usearch_warm
  description: Hooks benchmark — 10k × 10k, usearch backend, warm run

datasets:
  a:
    path: benchmarks/data/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/live/10kx10k_hooks_usearch/warm/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: themelder/arctic-embed-xs-entity-resolution
  a_cache_dir: benchmarks/live/10kx10k_hooks_usearch/warm/cache
  b_cache_dir: benchmarks/live/10kx10k_hooks_usearch/warm/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55
  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20
  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20
  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  csv_dir_path: benchmarks/live/10kx10k_hooks_usearch/warm/output

live:
  skip_initial_match: true
  match_log_path: benchmarks/live/10kx10k_hooks_usearch/warm/wal/events.ndjson

hooks:
  command: "python3 benchmarks/live/10kx10k_hooks_usearch/warm/hook.py"

performance:
  encoder_pool_size: 4
  vector_index_mode: "load"

vector_backend: usearch
top_n: 20
ann_candidates: 20
