job:
  name: live_1Mx1M_usearch_warm
  description: Live benchmark — 1M × 1M, usearch backend, warm run

datasets:
  a:
    path: benchmarks/data/dataset_a_1000k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_1000k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/live/1Mx1M_inject10k_usearch/warm/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: benchmarks/live/1Mx1M_inject10k_usearch/warm/cache
  b_cache_dir: benchmarks/live/1Mx1M_inject10k_usearch/warm/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55
  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20
  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20
  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

vector_backend: usearch
top_n: 5
ann_candidates: 5

performance:
  encoder_pool_size: 4
  vector_index_mode: "load"

live:
  upsert_log: benchmarks/live/1Mx1M_inject10k_usearch/warm/wal/events.ndjson

output:
  results_path:   benchmarks/live/1Mx1M_inject10k_usearch/warm/output/results.csv
  review_path:    benchmarks/live/1Mx1M_inject10k_usearch/warm/output/review.csv
  unmatched_path: benchmarks/live/1Mx1M_inject10k_usearch/warm/output/unmatched.csv
