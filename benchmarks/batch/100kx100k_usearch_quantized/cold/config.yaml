job:
  name: batch_100kx100k_usearch_quantized_cold
  description: Batch benchmark — 100k × 100k, usearch backend, quantized ONNX model, cold run

datasets:
  a:
    path: benchmarks/data/dataset_a_100k.csv
    id_field: entity_id
  b:
    path: benchmarks/data/dataset_b_100k.csv
    id_field: counterparty_id

cross_map:
  backend: local
  path: benchmarks/batch/100kx100k_usearch_quantized/cold/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  # model: themelder/arctic-embed-xs-entity-resolution
  a_cache_dir: benchmarks/batch/100kx100k_usearch_quantized/cold/cache
  b_cache_dir: benchmarks/batch/100kx100k_usearch_quantized/cold/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55
  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20
  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20
  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  results_path:   benchmarks/batch/100kx100k_usearch_quantized/cold/output/results.csv
  review_path:    benchmarks/batch/100kx100k_usearch_quantized/cold/output/review.csv
  unmatched_path: benchmarks/batch/100kx100k_usearch_quantized/cold/output/unmatched.csv

performance:
  encoder_pool_size: 4
  quantized: true
  vector_index_mode: "load"

vector_backend: usearch
top_n: 20
ann_candidates: 20
