job:
  name: batch_1Mx1M_bm25only_cold
  description: Batch benchmark — 1M × 1M, BM25-only, in-memory, cold start
datasets:
  a:
    path: benchmarks/data/dataset_a_1000k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_1000k.csv
    id_field: counterparty_id
    format: csv
cross_map:
  backend: local
  path: benchmarks/batch/1Mx1M_bm25only/cold/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id
embeddings:
  model: all-MiniLM-L6-v2
  # model: themelder/arctic-embed-xs-entity-resolution
  a_cache_dir: benchmarks/batch/1Mx1M_bm25only/cold/cache
blocking:
  enabled: true
  operator: and
  fields:
  - field_a: country_code
    field_b: domicile
match_fields:
- method: bm25
  weight: 0.55
  fields:
  - field_a: legal_name
    field_b: counterparty_name
  - field_a: short_name
    field_b: counterparty_name
- field_a: short_name
  field_b: counterparty_name
  method: fuzzy
  scorer: partial_ratio
  weight: 0.2
- field_a: country_code
  field_b: domicile
  method: exact
  weight: 0.2
- field_a: lei
  field_b: lei_code
  method: exact
  weight: 0.05
thresholds:
  auto_match: 0.85
  review_floor: 0.6
output:
  csv_dir_path: benchmarks/batch/1Mx1M_bm25only/cold/output
performance:
  encoder_pool_size: 1
top_n: 5
bm25_candidates: 10
