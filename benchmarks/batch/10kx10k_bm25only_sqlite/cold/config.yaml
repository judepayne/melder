job:
  name: batch_10kx10k_bm25only_sqlite_cold
  description: Batch benchmark — 10k × 10k, BM25-only, SQLite-backed store

datasets:
  a:
    path: benchmarks/data/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/batch/10kx10k_bm25only_sqlite/cold/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  # model: themelder/arctic-embed-xs-entity-resolution
  a_cache_dir: benchmarks/batch/10kx10k_bm25only_sqlite/cold/cache

batch:
  db_path: benchmarks/batch/10kx10k_bm25only_sqlite/cold/batch.db

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - method: bm25
    weight: 0.55
  - field_a: short_name
    field_b: counterparty_name
    method: fuzzy
    scorer: partial_ratio
    weight: 0.20
  - field_a: country_code
    field_b: domicile
    method: exact
    weight: 0.20
  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05

thresholds:
  auto_match: 0.85
  review_floor: 0.60

output:
  results_path:   benchmarks/batch/10kx10k_bm25only_sqlite/cold/output/results.csv
  review_path:    benchmarks/batch/10kx10k_bm25only_sqlite/cold/output/review.csv
  unmatched_path: benchmarks/batch/10kx10k_bm25only_sqlite/cold/output/unmatched.csv

performance:
  encoder_pool_size: 1

top_n: 20
bm25_candidates: 20
