job:
  name: batch_1Mx1M_usearch_cold
  description: Batch benchmark — 1M × 1M, usearch backend, cold run, production scoring config

datasets:
  a:
    path: benchmarks/data/dataset_a_1000k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_1000k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/batch/1Mx1M_usearch/cold/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  # model: themelder/arctic-embed-xs-entity-resolution
  a_cache_dir: benchmarks/batch/1Mx1M_usearch/cold/cache
  b_cache_dir: benchmarks/batch/1Mx1M_usearch/cold/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

bm25_fields:
  - field_a: legal_name
    field_b: counterparty_name
  - field_a: registered_address
    field_b: counterparty_address

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.30
  - field_a: registered_address
    field_b: counterparty_address
    method: embedding
    weight: 0.20
  - method: bm25
    weight: 0.50
  - field_a: legal_name
    field_b: counterparty_name
    method: synonym
    weight: 0.20

thresholds:
  auto_match: 0.88
  review_floor: 0.60

output:
  csv_dir_path: benchmarks/batch/1Mx1M_usearch/cold/output

performance:
  encoder_pool_size: 4
  #encoder_device: gpu
  encoder_batch_size: 256
  vector_index_mode: "load"

vector_backend: usearch
top_n: 5
ann_candidates: 50
