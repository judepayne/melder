job:
  name: soak_10kx10k_usearch
  description: Soak test — 10k x 10k base, usearch backend, long-running injection

datasets:
  a:
    path: benchmarks/data/dataset_a_10k.csv
    id_field: entity_id
    format: csv
  b:
    path: benchmarks/data/dataset_b_10k.csv
    id_field: counterparty_id
    format: csv

cross_map:
  backend: local
  path: benchmarks/soak/10kx10k_usearch/crossmap.csv
  a_id_field: entity_id
  b_id_field: counterparty_id

embeddings:
  model: all-MiniLM-L6-v2
  a_cache_dir: benchmarks/soak/10kx10k_usearch/cache
  b_cache_dir: benchmarks/soak/10kx10k_usearch/cache

blocking:
  enabled: true
  operator: and
  fields:
    - field_a: country_code
      field_b: domicile

match_fields:
  - field_a: legal_name
    field_b: counterparty_name
    method: embedding
    weight: 0.55
  - field_a: lei
    field_b: lei_code
    method: exact
    weight: 0.05
  - method: bm25
    weight: 0.40
    fields:
      - field_a: registered_address
        field_b: counterparty_address

thresholds:
  auto_match: 0.85
  review_floor: 0.60

vector_backend: usearch
top_n: 5
ann_candidates: 5

performance:
  encoder_pool_size: 4
  vector_index_mode: "load"

live:
  match_log_path: benchmarks/soak/10kx10k_usearch/wal/events.ndjson

output:
  csv_dir_path: benchmarks/soak/10kx10k_usearch/output/
